<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Management System</title>

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom Styling -->
    <style>
        body {
            background-color: #f5f7fa;
        }

        .navbar-brand {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .card {
            border-radius: 12px;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="/home">
            📚 Library System
        </a>

        <!-- Right Side Buttons -->
        <div>
            <a href="/home" class="btn btn-outline-light btn-sm me-2">
                <i class="fa fa-home"></i> Home
            </a>

            <a href="/mybooks" class="btn btn-outline-light btn-sm me-2">
                <i class="fa fa-book"></i> My Books
            </a>

            <a href="/admin" class="btn btn-warning btn-sm me-2">
                <i class="fa fa-user-shield"></i> Admin
            </a>

            <a href="/" class="btn btn-danger btn-sm">
                <i class="fa fa-sign-out-alt"></i> Logout
            </a>
        </div>

    </div>
</nav>

<!-- 📦 MAIN CONTENT -->
<div class="container mt-4">

    <!-- Messages (Optional) -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
